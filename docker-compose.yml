services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./wiki:/app/wiki
      - ./raw:/app/raw
      - ./schema.md:/app/schema.md
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-google/gemma-3-27b-it:free}
      - QMD_PATH=qmd
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
        - action: rebuild
          path: requirements.txt
